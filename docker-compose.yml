version: '3.8'

services:
  # Aplicação BarberOS
  barberos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberos-app
    restart: unless-stopped
    
    # Portas
    ports:
      - "${PORT:-3000}:3000"
    
    # Variáveis de ambiente
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_PATH: /app/data/barber.db
    
    # Volumes para dados persistentes
    volumes:
      - barberos-db:/app/data
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Limites de recursos
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: barberos-nginx
    restart: unless-stopped
    
    # Portas
    ports:
      - "80:80"
      - "443:443"
    
    # Volumes
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    
    # Depends
    depends_on:
      - barberos
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL (opcional - para dados mais robustos em produção)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: barberos-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: barberos
  #     POSTGRES_USER: barberos
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U barberos"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  barberos-db:
    driver: local
  nginx-cache:
    driver: local
  # postgres-data:
  #   driver: local

networks:
  default:
    driver: bridge
